<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Grammat: recept &amp; inköpslista</title>
<meta name="description" content="Grammat. Recept och inköpslista, allt i gram.">
<meta name="theme-color" content="#EAEDDF">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍲</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Schibsted+Grotesk:ital,wght@0,400;0,500;0,700;1,400&family=Spline+Sans+Mono:wght@400;600&display=swap">
<style>
:root{
  --papper:#EAEDDF;      /* blekt örtgrönt papper */
  --ink:#20281A;         /* djup grytgrön, nästan svart */
  --ink2:#5A6350;        /* dämpad text */
  --lin:#CDD3BC;         /* linjer, ramar */
  --lingon:#9E2B3E;      /* primär accent, knappar */
  --senap:#DDA321;       /* markering, avbockat */
  --kvitto:#FBFAF2;      /* kvittopapper */
  --font-display:'Bricolage Grotesque',sans-serif;
  --font-body:'Schibsted Grotesk',sans-serif;
  --font-mono:'Spline Sans Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--papper);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit}
button{font:inherit;cursor:pointer}
.wrap{max-width:640px;margin:0 auto;padding:1.25rem 1.25rem 6rem}
header.brand{padding:1.5rem 0 .5rem}
.wordmark{font-family:var(--font-display);font-weight:800;font-size:clamp(1.9rem,7vw,2.6rem);line-height:1.02;letter-spacing:-.03em}
.wordmark em{font-style:normal;color:var(--lingon)}
.tagline{font-family:var(--font-mono);font-size:.72rem;color:var(--ink2);letter-spacing:.08em;text-transform:uppercase;margin-top:.35rem}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--ink);display:flex;justify-content:center;gap:0;z-index:10;padding-bottom:env(safe-area-inset-bottom)}
.nav a{flex:1;max-width:214px;text-align:center;padding:.9rem .5rem;color:var(--papper);text-decoration:none;font-family:var(--font-mono);font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;border-top:3px solid transparent}
.nav a.active{border-top-color:var(--senap);color:var(--senap)}
.nav a:focus-visible{outline:2px solid var(--senap);outline-offset:-4px}
main{padding-top:1rem}
.view-head{display:flex;align-items:baseline;justify-content:space-between;gap:1rem;margin:1.2rem 0 1rem;flex-wrap:wrap}
h1{font-family:var(--font-display);font-weight:800;font-size:1.7rem;letter-spacing:-.02em;line-height:1.1}
h2{font-family:var(--font-display);font-weight:700;font-size:1.15rem;margin:1.6rem 0 .6rem}
.btn{display:inline-block;background:var(--lingon);color:#fff;border:2px solid var(--lingon);border-radius:8px;padding:.5em 1.1em;font-weight:700;font-size:.95rem;text-decoration:none;transition:transform .12s ease}
.btn:hover{transform:translateY(-1px)}
.btn:focus-visible,.kvitto-check:focus-visible,.stepper button:focus-visible{outline:3px solid var(--senap);outline-offset:2px}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--ink)}
.btn-danger{background:transparent;color:var(--lingon);border-color:var(--lingon)}
.cards{display:grid;gap:.9rem}
.card{background:var(--kvitto);border:1.5px solid var(--ink);border-radius:10px;padding:1rem 1.1rem;display:flex;flex-direction:column}
.card-title{font-family:var(--font-display);font-weight:700;font-size:1.2rem;text-decoration:none;display:block}
.card-title:hover{color:var(--lingon)}
.card-meta{font-family:var(--font-mono);font-size:.75rem;color:var(--ink2);margin:.15rem 0 .7rem}
.card-row{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;margin-top:auto;padding-top:.6rem}
.stepper{display:inline-flex;align-items:center;gap:.15rem;border:1.5px solid var(--ink);border-radius:8px;background:#fff}
.stepper button{width:2.2rem;height:2.2rem;background:none;border:none;font-size:1.2rem;font-weight:700;color:var(--ink)}
.stepper span{font-family:var(--font-mono);font-size:.85rem;min-width:4.5em;text-align:center}
.portion-bar{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;margin-bottom:.5rem}
.ing-table{width:100%;border-collapse:collapse;background:var(--kvitto);border:1.5px solid var(--ink);border-radius:10px;overflow:hidden}
.ing-table td{padding:.45rem .8rem;border-bottom:1px solid var(--lin);font-size:.95rem}
.ing-table tr:last-child td{border-bottom:none}
.ing-table .num{text-align:right;font-family:var(--font-mono);font-size:.85rem;white-space:nowrap}
.ing-group td{font-family:var(--font-mono);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);padding-top:.9rem}
.steps{padding-left:1.3rem;display:grid;gap:.55rem}
.steps li::marker{font-family:var(--font-mono);font-weight:600;color:var(--lingon)}
.source{margin-top:1rem;font-size:.85rem;color:var(--ink2)}
.empty{color:var(--ink2);margin:1.2rem 0}
.warn{color:var(--lingon);font-weight:500}
.hint{font-size:.85rem;color:var(--ink2);margin:.3rem 0 .8rem}

/* ---- signaturen: kvittot ---- */
.kvitto{background:var(--kvitto);font-family:var(--font-mono);border:1px solid var(--lin);border-radius:2px;padding:1.4rem 1.1rem;box-shadow:0 2px 10px rgba(32,40,26,.08);position:relative}
.kvitto::before,.kvitto::after{content:'';position:absolute;left:0;right:0;height:8px;background:linear-gradient(-45deg,transparent 33.33%,var(--kvitto) 33.33%,var(--kvitto) 66.67%,transparent 66.67%),linear-gradient(45deg,transparent 33.33%,var(--kvitto) 33.33%,var(--kvitto) 66.67%,transparent 66.67%);background-size:12px 16px}
.kvitto::before{top:-8px;transform:rotate(180deg)}
.kvitto::after{bottom:-8px}
.kvitto-head{text-align:center;font-size:.78rem;letter-spacing:.14em;border-bottom:1px dashed var(--ink2);padding-bottom:.8rem}
.kvitto-recipes{text-align:center;font-size:.72rem;color:var(--ink2);padding:.6rem 0;border-bottom:1px dashed var(--ink2)}
.kvitto-cat{font-size:.7rem;letter-spacing:.14em;color:var(--ink2);text-align:center;margin:1rem 0 .3rem}
.kvitto-item{display:flex;align-items:baseline;gap:.6rem;padding:.3rem 0;font-size:.86rem}
.kvitto-check{width:1.35rem;height:1.35rem;flex-shrink:0;align-self:center;border:1.5px solid var(--ink);border-radius:4px;background:#fff;font-weight:600;line-height:1;color:var(--lingon)}
.kvitto-item.done .kvitto-check{background:var(--senap);border-color:var(--senap);color:var(--ink)}
.kvitto-name{flex:1;min-width:0}
.kvitto-name summary{list-style:none;cursor:pointer}
.kvitto-name summary::-webkit-details-marker{display:none}
.kvitto-item.done .kvitto-name summary,.kvitto-item.done>span.kvitto-name{text-decoration:line-through;color:var(--ink2)}
.kvitto-src{font-size:.72rem;color:var(--ink2);padding:.2rem 0 .3rem}
.kvitto-amount{font-size:.8rem;white-space:nowrap;text-align:right}
.kvitto-item.done .kvitto-amount{color:var(--ink2)}
.kvitto-del{background:none;border:none;font-size:.9rem;opacity:.6}
.kvitto-foot{border-top:1px dashed var(--ink2);margin-top:1rem;padding-top:.8rem;text-align:center;font-size:.78rem;letter-spacing:.1em}

.howto{margin-bottom:1.2rem}
.prompt-box{margin:1rem 0}
.prompt-box summary{cursor:pointer;font-weight:500}
.prompt-box pre{background:var(--kvitto);border:1.5px solid var(--ink);border-radius:10px;padding:1rem;font-family:var(--font-mono);font-size:.72rem;white-space:pre-wrap;overflow-x:auto;margin-top:.6rem}
.extra-form{display:flex;gap:.6rem;margin-top:1.2rem}
.action-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1.2rem}
.extra-form input{flex:1}
.backup-actions{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
.backup-file input{position:absolute;inline-size:1px;block-size:1px;opacity:0;pointer-events:none}
input,select,textarea{font:inherit;color:var(--ink);background:#fff;border:1.5px solid var(--ink);border-radius:8px;padding:.45em .7em}
input:focus-visible,select:focus-visible,textarea:focus-visible{outline:3px solid var(--senap);outline-offset:1px}
label{display:block;margin:.8rem 0;font-weight:500}
label input{display:block;width:100%;margin-top:.25rem}
textarea{width:100%}
.ed-row{display:grid;grid-template-columns:1fr 4.6rem 3.6rem 4rem 6.5rem 2rem;gap:.4rem;margin-bottom:.4rem;align-items:center}
.ed-row input,.ed-row select{padding:.35em .5em;font-size:.85rem;min-width:0}
.ed-remove{background:none;border:none;font-size:1.1rem;color:var(--ink2)}
@media(max-width:560px){.ed-row{grid-template-columns:1fr 4rem 3.2rem 2rem;grid-auto-rows:auto}.ed-row .ed-count,.ed-row .ed-cat{grid-column:span 2}}
@media(min-width:720px){
  .wrap{padding-bottom:3rem}
  .nav{position:static;background:transparent;justify-content:flex-start;gap:1.6rem;margin-top:.8rem}
  .nav a{flex:0 0 auto;color:var(--ink);padding:.2rem 0;border-top:none;border-bottom:3px solid transparent}
  .nav a.active{border-bottom-color:var(--lingon);color:var(--ink)}
  .cards{grid-template-columns:1fr 1fr}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}html{scroll-behavior:auto}}
</style>
</head>
<body>
<div class="wrap">
  <header class="brand">
    <div class="wordmark">gram<em>mat</em>.</div>
    <div class="tagline">recept &amp; inköpslista · allt i gram</div>
    <nav class="nav" aria-label="Huvudmeny">
      <a href="#/" data-match="#/">Mina recept</a>
      <a href="#/lista" data-match="#/lista">Lista<span id="navListCount"></span></a>
      <a href="#/allas" data-match="#/allas">Allas recept</a>
      <a href="#/konto" data-match="#/konto" id="navUser">konto</a>
    </nav>
  </header>
  <main id="view" aria-live="polite"></main>
</div>
<script src="app.js"></script>
</body>
</html>
